<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Luxury</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Poppins;background:#f5f5f5;color:#333;}

.container{max-width:1200px;margin:auto;padding:0 20px;}

/* HEADER */
header{
  background:#0b1d2a;
  color:white;
  padding:20px 0;
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo{color:#ff9f43;font-weight:600;}
nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
}
nav a:hover{color:#ff9f43;}

/* HERO */
.hero{
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  height:500px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
}
.hero h1{font-size:45px;margin-bottom:15px;}
.btn{
  background:#ff9f43;
  padding:12px 30px;
  border:none;
  color:white;
  cursor:pointer;
}

/* CATEGORIES */
.categories{
  background:white;
  padding:40px 0;
  text-align:center;
}
.categories span{
  margin:0 15px;
  color:#777;
  cursor:pointer;
}

/* FEATURE SECTION */
.feature{
  padding:60px 0;
}
.feature-box{
  display:flex;
  gap:30px;
  align-items:center;
}
.feature img{
  width:50%;
  border-radius:10px;
}
.feature-text{
  background:white;
  padding:30px;
  border-radius:10px;
}

/* PRODUCTS */
.products{
  padding:60px 0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}
.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{transform:translateY(-5px);}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}
.card-content{
  padding:15px;
}

/* BLOG / GALLERY */
.gallery{
  padding:60px 0;
}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}
.gallery img{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
footer{
  background:#0b1d2a;
  color:white;
  padding:40px 0;
  text-align:center;
}

input{
  padding:10px;
  margin:10px;
  width:250px;
  border:none;
}

@media(max-width:900px){
  .feature-box{flex-direction:column;}
  .gallery-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <div class="container nav">
    <div class="logo">FurniLuxury</div>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Products</a>
      <a href="#">Blog</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Modern Living Interior</h1>
    <button class="btn">Shop Now</button>
  </div>
</section>

<section class="categories">
  <span>Sofas</span>
  <span>Chairs</span>
  <span>Tables</span>
  <span>Decor</span>
  <span>Lighting</span>
</section>

<section class="feature container">
  <div class="feature-box">
    <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
    <div class="feature-text">
      <h2>Create Your Dream Interior</h2>
      <p>Beautiful furniture designed for modern homes.</p>
      <button class="btn">Explore</button>
    </div>
  </div>
</section>

<section class="products container">
  <h2 style="text-align:center;margin-bottom:30px;">Featured Products</h2>
  <div class="grid">
    
    <div class="card">
      <img src="https://images.unsplash.com/photo-1616627988500-b8f6a4c8c8e9">
      <div class="card-content">
        <h3>Sofa</h3>
        <p>$800</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1582582429416-9a4f74a8df42">
      <div class="card-content">
        <h3>Table</h3>
        <p>$400</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1493666438817-866a91353ca9">
      <div class="card-content">
        <h3>Chair</h3>
        <p>$200</p>
      </div>
    </div>

  </div>
</section>

<section class="gallery container">
  <div class="gallery-grid">
    <img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb">
    <img src="https://images.unsplash.com/photo-1484101403633-562f891dc89a">
    <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">
  </div>
</section>

<footer>
  <h3>Contact Us</h3>
  <input placeholder="Email">
  <button class="btn">Subscribe</button>
  <p style="margin-top:20px;">© 2026 FurniLuxury</p>
</footer>

</body>
</html>
