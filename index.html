<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Home | Curated Collections</title>
    <style>
        :root {
            --navy: #001f3f; 
            --yellow: #ffcc00; 
            --beige: #f5f0e6; 
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--navy);
            background-color: var(--beige);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            box-sizing: border-box;
            z-index: 1000;
            transition: var(--transition);
            background: transparent;
        }

        .main-nav.scrolled {
            background: var(--navy);
            padding: 15px 10%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--navy);
            text-decoration: none;
            transition: var(--transition);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--navy);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--yellow); }
        .main-nav.scrolled .logo, .main-nav.scrolled .nav-links a { color: var(--white); }

        /* --- BANNER SECTION (UPDATED) --- */
        .banner-container {
            padding: 100px 10% 10px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .hero-banner {
            height: 500px;
            border-radius: 30px;
            background: linear-gradient(rgba(0,31,63,0.3), rgba(0,31,63,0.3)), 
                        url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        /* Растение на столе (Слева) */
        .hero-banner::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 5%;
            width: 220px;
            height: 280px;
            background: url('https://images.unsplash.com/photo-1597072689227-8882273e8f6a?auto=format&fit=crop&w=400&q=80') no-repeat;
            background-size: contain;
            background-position: bottom;
            z-index: 2;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        /* Подушки и одеяло (Справа) */
        .hero-banner::after {
            content: "";
            position: absolute;
            bottom: -20px;
            right: 2%;
            width: 300px;
            height: 200px;
            background: url('https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?auto=format&fit=crop&w=500&q=80') no-repeat;
            background-size: cover;
            border-radius: 20px;
            transform: rotate(-3deg);
            z-index: 2;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border: 5px solid var(--white);
        }

        .hero-text {
            position: relative;
            z-index: 5;
            max-width: 600px;
        }

        .hero-text h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
