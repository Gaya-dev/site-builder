<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Jewelry</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #faf7f5;
}

/* HEADER */
header {
  background: #111;
  color: #fff;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  letter-spacing: 2px;
}

/* HERO */
.hero {
  background: url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338') center/cover;
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 40px;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.product {
  background: white;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  transition: 0.3s;
  cursor: pointer;
}

.product:hover {
  transform: scale(1.05);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.product h3 {
  margin: 10px 0 5px;
}

.price {
  color: #b76e79;
  font-weight: bold;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 400px;
  text-align: center;
}

.modal img {
  width: 100%;
  border-radius: 10px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

/* BUTTON */
button {
  background: #b76e79;
  border: none;
  padding: 10px 20px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #a05560;
}

</style>
</head>

<body>

<header>💎 Luxe Jewelry</header>

<div class="hero">
  Elegant Collection
</div>

<section class="products">

  <div class="product" onclick="openModal('Ring', '$120', 'https://images.unsplash.com/photo-1603569283847-aa295f0d016a')">
    <img src="https://images.unsplash.com/photo-1603569283847-aa295f0d016a">
    <h3>Diamond Ring</h3>
    <p class="price">$120</p>
  </div>

  <div class="product" onclick="openModal('Necklace', '$180', 'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f')">
    <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
    <h3>Gold Necklace</h3>
    <p class="price">$180</p>
  </div>

  <div class="product" onclick="openModal('Earrings', '$90', 'https://images.unsplash.com/photo-1617038220319-276d3cfab638')">
    <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
    <h3>Luxury Earrings</h3>
    <p class="price">$90</p>
  </div>

</section>

<!-- MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <button>Add to Cart</button>
  </div>
</div>

<script>
function openModal(title, price, img) {
  document.getElementById('productModal').style.display = 'flex';
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalPrice').innerText = price;
  document.getElementById('modalImg').src = img;
}

function closeModal() {
  document.getElementById('productModal').style.display = 'none';
}
</script>

</body>
</html>
