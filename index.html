<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Furniture</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f4f4;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo { font-size: 26px; font-weight: bold; }

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #333;
}

/* HERO */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  animation: fadeIn 1.5s ease;
}

.hero button {
  margin-top: 20px;
  padding: 15px 35px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

/* PRODUCTS */
.products {
  padding: 80px 50px;
}

.products h2 {
  text-align: center;
  margin-bottom: 50px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap: 40px;
}

.card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  transition: 0.4s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.card-content {
  padding: 20px;
  text-align: center;
}

/* POPUP */
.popup {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-content {
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:400px;
  text-align:center;
}

.popup img {
  width:100%;
  border-radius:10px;
}

/* CART */
.cart {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: black;
  color: white;
  padding: 15px 20px;
  border-radius: 50px;
}

/* CONTACT */
.contact {
  padding: 80px;
  background: #111;
  color: white;
  text-align: center;
}

.contact input, .contact textarea {
  display:block;
  margin:10px auto;
  padding:10px;
  width:300px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <div class="logo">FurniLuxury</div>
  <nav>
    <a href="#">Главная</a>
    <a href="#">Каталог</a>
    <a href="#">Контакты</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Luxury Furniture</h1>
    <button onclick="scrollToProducts()">Смотреть</button>
  </div>
</section>

<section class="products" id="products">
  <h2>Каталог</h2>

  <div class="grid">
    <div class="card" onclick="openPopup('Диван', 'https://images.unsplash.com/photo-1616627988500-b8f6a4c8c8e9')">
      <img src="https://images.unsplash.com/photo-1616627988500-b8f6a4c8c8e9">
      <div class="card-content">
        <h3>Диван</h3>
        <p>$500</p>
      </div>
    </div>

    <div class="card" onclick="openPopup('Кровать', 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85')">
      <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
      <div class="card-content">
        <h3>Кровать</h3>
        <p>$700</p>
      </div>
    </div>

    <div class="card" onclick="openPopup('Стол', 'https://images.unsplash.com/photo-1582582429416-9a4f74a8df42')">
      <img src="https://images.unsplash.com/photo-1582582429416-9a4f74a8df42">
      <div class="card-content">
        <h3>Стол</h3>
        <p>$300</p>
      </div>
    </div>
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <img id="popup-img">
    <h2 id="popup-title"></h2>
    <button onclick="addToCart()">Добавить в корзину</button><br><br>
    <button onclick="closePopup()">Закрыть</button>
  </div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  🛒 0
</div>

<section class="contact">
  <h2>Контакты</h2>
  <input placeholder="Имя">
  <input placeholder="Email">
  <textarea placeholder="Сообщение"></textarea>
  <button>Отправить</button>
</section>

<script>
let cartCount = 0;

function openPopup(title, img) {
  document.getElementById('popup').style.display = 'flex';
  document.getElementById('popup-title').innerText = title;
  document.getElementById('popup-img').src = img;
}

function closePopup() {
  document.getElementById('popup').style.display = 'none';
}

function addToCart() {
  cartCount++;
  document.getElementById('cart').innerText = "🛒 " + cartCount;
  closePopup();
}

function scrollToProducts() {
  document.getElementById('products').scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
