<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxe Jewelry</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f9f6f4;
  color: #333;
}

/* HEADER */
header {
  background: #111;
  color: #fff;
  padding: 20px;
  text-align: center;
  font-size: 26px;
  letter-spacing: 3px;
}

/* HERO */
.hero {
  height: 350px;
  background: url('https://images.unsplash.com/photo-1515562141207-7a88fb7ce338') center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 42px;
  background: rgba(0,0,0,0.4);
  padding: 15px 30px;
  border-radius: 10px;
}

/* PRODUCTS GRID */
.products {
  padding: 50px 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
}

.product {
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.product:hover {
  transform: translateY(-8px);
}

.product img {
  width: 100%;
  height: 250px;
  object-fit: cover;
}

.product-info {
  padding: 15px;
  text-align: center;
}

.product h3 {
  margin-bottom: 5px;
}

.price {
  color: #c89b3c;
  font-weight: bold;
  font-size: 18px;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-content {
  background: #fff;
  border-radius: 15px;
  max-width: 400px;
  width: 100%;
  padding: 20px;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);}
  to {opacity: 1; transform: scale(1);}
}

.modal img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 15px;
}

.close {
  float: right;
  font-size: 22px;
  cursor: pointer;
}

/* BUTTON */
button {
  margin-top: 10px;
  background: #c89b3c;
  border: none;
  padding: 12px 25px;
  color: white;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

button:hover {
  background: #a67c2e;
}

/* MOBILE */
@media (max-width: 600px) {
  .hero h1 {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<header>💎 LUXE JEWELRY</header>

<div class="hero">
  <h1>Timeless Elegance</h1>
</div>

<section class="products">

  <div class="product" onclick="openModal('Diamond Ring', '$120', 'https://images.unsplash.com/photo-1603569283847-aa295f0d016a')">
    <img src="https://images.unsplash.com/photo-1603569283847-aa295f0d016a">
    <div class="product-info">
      <h3>Diamond Ring</h3>
      <p class="price">$120</p>
    </div>
  </div>

  <div class="product" onclick="openModal('Gold Necklace', '$180', 'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f')">
    <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
    <div class="product-info">
      <h3>Gold Necklace</h3>
      <p class="price">$180</p>
    </div>
  </div>

  <div class="product" onclick="openModal('Luxury Earrings', '$90', 'https://images.unsplash.com/photo-1617038220319-276d3cfab638')">
    <img src="https://images.unsplash.com/photo-1617038220319-276d3cfab638">
    <div class="product-info">
      <h3>Luxury Earrings</h3>
      <p class="price">$90</p>
    </div>
  </div>

</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <img id="modalImg">
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>
</div>

<script>
function openModal(title, price, img) {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalPrice').innerText = price;
  document.getElementById('modalImg').src = img;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function addToCart() {
  alert("Added to cart 🛒");
}
</script>

</body>
</html>
