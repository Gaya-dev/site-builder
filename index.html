<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Home | Curated Collections</title>
    <style>
        :root {
            --navy: #001f3f; 
            --yellow: #ffcc00; 
            --beige: #f5f0e6; 
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--navy);
            background-color: var(--beige);
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .main-nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            box-sizing: border-box;
            z-index: 1000;
            transition: var(--transition);
            background: transparent;
        }

        .main-nav.scrolled {
            background: var(--navy);
            padding: 15px 10%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--navy);
            text-decoration: none;
            transition: var(--transition);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--navy);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--yellow); }

        .main-nav.scrolled .logo,
        .main-nav.scrolled .nav-links a { color: var(--white); }

        /* Animation Classes */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- BANNER SECTION --- */
        .banner-container {
            padding: 100px 10% 10px;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .hero-banner {
            height: 450px;
            border-radius: 20px;
            background: linear-gradient(rgba(0,31,63,0.2), rgba(0,31,63,0.2)), 
                        url('https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        /* Декоративное растение слева */
        .hero-banner::after {
            content: "";
            position: absolute;
            bottom: 15%;
            left: 8%;
            width: 120px;
            height: 120px;
            background-image: url('https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            border: 3px solid var(--white);
            z-index: 2;
        }

        /* Подушки/акценты справа */
        .hero-banner::before {
            content: "";
            position: absolute;
            bottom: 10%;
            right: 12%;
            width: 200px;
            height: 130px;
            background-image: url('https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&w=600&q=80');
            background-size: cover;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            z-index: 2;
            transform: rotate(2deg);
        }

        .hero-text {
            position: relative;
            z-index: 5;
        }

        .hero-text h1 {
            margin: 0 auto;
            font-size: 2.5rem;
            max-width: 800px;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .hero-btn {
            background: var(--yellow);
            color: var(--navy);
            padding: 12px 40px;
            font-weight: bold;
            margin: 25px auto 0;
            border-radius: 50px;
            display: inline-block;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
            border: 2px solid var(--yellow);
        }

        .hero-btn:hover {
            background: transparent;
            color: var(--white);
            transform: scale(1.05);
        }

        /* --- COLLAGE SECTION --- */
        section { padding: 60px 10%; }
        
        h2 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .collage-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: repeat(2, 250px);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .collage-item {
