<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furnish</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f6f7;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: white;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

nav a {
  margin: 0 15px;
  text-decoration: none;
  color: #333;
}

/* HERO */
.hero {
  margin: 30px;
  border-radius: 30px;
  background: linear-gradient(135deg,#0f6a74,#0b3d45);
  color: white;
  padding: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hero h1 {
  font-size: 40px;
}

.hero img {
  width: 400px;
  border-radius: 20px;
}

/* FEATURES */
.features {
  display: flex;
  justify-content: space-around;
  margin: 30px;
}

.feature {
  background: white;
  padding: 20px;
  border-radius: 15px;
  width: 22%;
  text-align: center;
}

/* PRODUCTS */
.products {
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 20px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: teal;
  font-weight: bold;
}

/* SALE */
.sale {
  margin: 30px;
  padding: 30px;
  border-radius: 20px;
  background: #e9f3f4;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: #0b3d45;
  color: white;
}

/* MOBILE */
@media(max-width:768px){
  .hero {
    flex-direction: column;
    text-align: center;
  }

  .features {
    flex-direction: column;
    gap: 15px;
  }

  .feature {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Furnish.</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Product</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Discover Your Perfect Space</h1>
    <p>Luxury furniture for modern living</p>
  </div>
  <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
</section>

<section class="features">
  <div class="feature">Easy Shopping</div>
  <div class="feature">Fast Shipping</div>
  <div class="feature">24/7 Support</div>
  <div class="feature">Money Back</div>
</section>

<section class="products">
  <h2>Products</h2>
  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7">
      <h3>Sofa</h3>
      <p class="price">$320</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1615873968403-89e068629265">
      <h3>Chair</h3>
      <p class="price">$120</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1519710164239-da123dc03ef4">
      <h3>Lamp</h3>
      <p class="price">$90</p>
    </div>

  </div>
</section>

<section class="sale">
  <div>
    <h2>Super Sale 🔥</h2>
    <p>Up to 50% off limited time</p>
  </div>
  <h2>$199</h2>
</section>

<footer>
  © 2026 Furnish. All rights reserved.
</footer>

</body>
</html>
